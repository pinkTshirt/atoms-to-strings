<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atoms to Strings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">
                <span class="logo-icon">⚛️</span>
                <h1>Atoms <span class="accent-text">to</span> Strings</h1>
            </div>
            <nav class="main-nav">
                <a href="#" class="nav-link active">Workspace</a>
                <a href="#" class="nav-link">Documentation</a>
                <a href="https://github.com/pinkTshirt/atoms-to-strings" target="_blank" class="nav-link github-link">GitHub</a>
            </nav>
        </div>
    </header>

    <main class="container workspace-container">
        <!-- Control/Configuration Panel -->
        <section class="panel control-panel">
            <h2>Configuration</h2>
            <div class="form-group">
                <label for="mode-select">Processing Mode</label>
                <select id="mode-select" class="form-control">
                    <option value="serialize">Serialize (Atoms → String)</option>
                    <option value="deserialize">Parse (String → Atoms)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="format-select">Output Format</label>
                <select id="format-select" class="form-control">
                    <option value="json">Standard JSON</option>
                    <option value="binary">Compressed Binary String</option>
                    <option value="custom">Custom Protocol Token</option>
                </select>
            </div>
            <button id="process-btn" class="btn btn-primary">Execute Transformation</button>
        </section>

        <!-- Dynamic Data IO Grid -->
        <section class="io-grid">
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2>Source Input</h2>
                    <span class="badge">Awaiting Data</span>
                </div>
                <textarea id="input-area" class="form-control text-workspace" placeholder="Enter configuration, object structures, or atomic entities here..."></textarea>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <h2>Processed Output</h2>
                    <button id="copy-btn" class="btn btn-secondary btn-sm">Copy Output</button>
                </div>
                <div class="output-display-wrapper">
                    <pre id="output-area" class="output-placeholder">Transformation results will appear here in real-time...</pre>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="container footer-content">
            <p>&copy; 2026 Atoms to Strings. Built for optimal performance.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

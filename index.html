<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From atom to string</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
    <canvas id="starfield"></canvas>
    <div id="scene"></div>

    <div id="plasma-route-trigger" class="right-route-btn">
        <div class="pulse-ring"></div>
        <span>Alternative Route: QGP Plasma &arr;</span>
    </div>

    <div id="tooltip"><h3 id="tt-title"></h3><span class="badge" id="tt-badge"></span><p id="tt-body"></p></div>
    <div id="stage-ui"><h2 id="st-title"></h2><div class="scale" id="st-scale"></div></div>
    <div id="click-hint">click diagram · scroll to zoom</div>
    <div id="nav"></div>
    <div id="prog"></div>
    <div id="scroll-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="6" y="2" width="12" height="20" rx="6"/>
            <line x1="12" y1="6" x2="12" y2="10" stroke-linecap="round"/>
        </svg>
        <span id="scroll-label">Scroll to zoom in</span>
    </div>
    
    <div id="modal">
        <div id="modal-inner">
            <button id="modal-close">&#x2715;</button>
            <h2 id="m-title"></h2>
            <span class="mbadge" id="m-badge"></span>
            <div id="m-body"></div>
        </div>
    </div>

    <div id="plasma-animation-overlay" class="plasma-overlay">
        <button id="close-plasma-btn">&times; Return to Timeline</button>
        <div class="simulation-info">
            <h2>Quark-Gluon Plasma</h2>
            <p>Deconfined primordial soup at trillions of degrees Celsius where quarks and gluons float freely without being locked into hadrons.</p>
        </div>
        <canvas id="plasma-canvas"></canvas>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Engines - Standard Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="brand">COSMIC ENGINES</div>
        <div class="epoch-nav" id="epochNav">
            <div class="epoch-item" onclick="zoomToEpoch(0)">Inflation (~10⁻³²s)</div>
            <div class="epoch-item" onclick="zoomToEpoch(1)">Primordial Soup</div>
            <div class="epoch-item" onclick="zoomToEpoch(2)">Atoms Form (380k yr)</div>
            <div class="epoch-item" onclick="zoomToEpoch(3)">First Stars (50-200M yr)</div>
            <div class="epoch-item" onclick="zoomToEpoch(4)">Present Day (13.8B yr)</div>
        </div>
        <div class="info-card">
            <h2 id="cardTitle">Select an Epoch</h2>
            <div class="scale-metric" id="cardMetric"></div>
            <p id="cardDescription"></p>
        </div>
    </aside>

    <main class="viewport">
        <canvas id="cosmicCanvas"></canvas>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>From Atom to String & Cosmology</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
    <!-- Architecture Switching Sidebar -->
    <div id="sidebar">
        <div class="sidebar-brand">Cosmic Engines</div>
        <div class="mode-btn active" id="btn-scale-mode" data-mode="scale">
            <h3>Scale Timeline</h3>
            <p>From Atom to String</p>
        </div>
        <div class="mode-btn" id="btn-cosmo-mode" data-mode="cosmo">
            <h3>Cosmic Timeline</h3>
            <p>Standard Cosmology Model</p>
        </div>
        <div class="sidebar-footer">Scroll/Arrow keys to advance</div>
    </div>

    <!-- MAIN VIEWPORTS CONTAINER -->
    <div id="viewports-container">
        
        <!-- MODE A: SCALE SIMULATION VIEWPORT -->
        <div id="viewport-scale" class="viewport active">
            <canvas id="starfield"></canvas>
            <div id="scene"></div>
            <div id="stage-ui"><h2 id="st-title"></h2><div class="scale" id="st-scale"></div></div>
            <div id="click-hint">click diagram · scroll to zoom</div>
            <div id="nav"></div>
            <div id="prog"></div>
            <div id="scroll-hint">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="6" y="2" width="12" height="20" rx="6"/>
                    <line x1="12" y1="6" x2="12" y2="10" stroke-linecap="round"/>
                </svg>
                <span id="scroll-label">Scroll to zoom in</span>
            </div>
        </div>

        <!-- MODE B: COSMOLOGY SIMULATION VIEWPORT -->
        <div id="viewport-cosmo" class="viewport">
            <canvas id="plasma-canvas"></canvas>
            <div id="cosmo-hud">
                <h2 id="cosmo-title">Quark-Gluon Plasma</h2>
                <div id="cosmo-meta">
                    <span id="cosmo-time">Time: ~10⁻⁵ Seconds</span>
                    <span id="cosmo-temp">Temp: ~10¹² K</span>
                </div>
                <p id="cosmo-body"></p>
            </div>
            <div id="cosmo-scroll-hint">
                <span>Scroll Down to Advance Cosmic Time &darr;</span>
            </div>
        </div>
        
    </div>
    
    <!-- Shared Modal Overlay for Scale Details -->
    <div id="modal">
        <div id="modal-inner">
            <button id="modal-close">&#x2715;</button>
            <h2 id="m-title"></h2>
            <span class="mbadge" id="m-badge"></span>
            <div id="m-body"></div>
        </div>
    </div>

    <!-- Shared Popover Hover Tooltip -->
    <div id="tooltip"><h3 id="tt-title"></h3><span class="badge" id="tt-badge"></span><p id="tt-body"></p></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
